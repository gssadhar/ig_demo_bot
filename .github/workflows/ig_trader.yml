name: Automated IG Trading Bot

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Runs Monday to Friday at 08:00 UTC
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  run-trading-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests trading-ig yfinance

      - name: Step 1 - Run Stock Screener
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python stock_screener.py

      - name: Step 2 - Run IG Trading Bot
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
          IG_ACC_TYPE: ${{ secrets.IG_ACC_TYPE }}
        run: python trading_bot_ig.py

      - name: Commit and Push Updated Dashboard
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html top_candidates.json trade_log.json
          git commit -m "Auto-update trading dashboard and reports [skip ci]" || exit 0
          git push
