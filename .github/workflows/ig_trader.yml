name: Automated IG Trading Bot

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Runs Monday to Friday at 08:00 UTC
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  run-trading-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests trading-ig

      - name: Step 1 - Run Stock Screener
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python stock_screener.py

      - name: Step 2 - Run IG Trading Bot
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
          IG_ACC_TYPE: ${{ secrets.IG_ACC_TYPE }}
        run: python trading_bot_ig.py

      - name: Upload Screener Results and Logs
        uses: actions/upload-artifact@v4
        with:
          name: trading-results
          path: |
            top_candidates.json
            trade_log.json
            index.html
