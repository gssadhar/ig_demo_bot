name: IG Automated Trader

on:
  schedule:
    - cron: '*/15 8-21 * * 1-5'
  workflow_dispatch:

jobs:
  run-trader:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install trading-ig pandas yfinance requests munch

      - name: Execute IG Trading Bot
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
        run: python trading_bot_ig.py
