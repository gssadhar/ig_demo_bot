name: IG Automated Equity Screener & Trader

on:
  workflow_dispatch: # Allows manual trigger via GitHub Actions tab
  schedule:
    - cron: '0 8 * * 1-5' # Runs automatically Monday-Friday at 08:00 AM UTC

jobs:
  run-trader:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install required libraries
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance trading_ig

      # 4. Step 1: Run Screener (Generates top_candidates.json & sends email)
      - name: Step 1 - Run Stock Screener
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python stock_screener.py

      # 5. Step 2: Run Trading Bot (Reads top_candidates.json & places trades)
      - name: Step 2 - Run IG Trading Bot
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
        run: python trading_bot_ig.py
