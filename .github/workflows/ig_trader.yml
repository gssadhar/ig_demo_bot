name: Automated IG Trading Bot

on:
  workflow_dispatch: # Allows manual run anytime
  schedule:
    # Runs Monday to Friday at 15:00 UTC (16:00 UK Time) during market hours
    - cron: '0 15 * * 1-5'

jobs:
  run-trading-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance trading-ig munch

      - name: Step 1 - Run Stock Screener
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python stock_screener.py

      - name: Step 2 - Run IG Trading Bot
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
          IG_ACC_TYPE: ${{ secrets.IG_ACC_TYPE }}
        run: python trading_bot_ig.py
